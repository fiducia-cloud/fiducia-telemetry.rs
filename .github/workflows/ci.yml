# CI: build, test, and lint (rustfmt/clippy) on push and pull request.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          path: repo
      - name: Validate GitHub Actions
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: repo/.github/workflows/ci.yml repo/.github/workflows/cli-flags.yml
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-interfaces
          ref: 487e470c45ab5851e8f6f3b1dc048fe067fbf408
          path: fiducia-interfaces
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: repo
      - name: fmt
        working-directory: repo
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: repo
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: test
        working-directory: repo
        run: cargo test --locked --all-targets
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-audit@0.22.2
      - name: audit
        working-directory: repo
        run: cargo audit
