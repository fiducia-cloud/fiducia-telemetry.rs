# Audits the .cli-flags.toml schema with the pinned flags2env submodule whenever
# the CLI flag config, scripts, or submodule change.
name: CLI flags

on:
  pull_request:
    paths:
      - ".github/workflows/cli-flags.yml"
      - ".cli-flags.toml"
      - ".gitmodules"
      - "vendor/flags-2-env"
      - "scripts/with-flags2env.sh"
  push:
    branches: [main]
    paths:
      - ".github/workflows/cli-flags.yml"
      - ".cli-flags.toml"
      - ".gitmodules"
      - "vendor/flags-2-env"
      - "scripts/with-flags2env.sh"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          submodules: recursive
      - run: make -B -C vendor/flags-2-env all
      - run: vendor/flags-2-env/build/flags2env audit .cli-flags.toml
