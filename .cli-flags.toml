# flags-2-env flag schema for the fiducia-telemetry CLI surface: maps
# command-line flags to the env vars the library reads at init(). Consumed by
# scripts/with-flags2env.sh and audited in CI (cli-flags.yml).
[help]
url = "https://github.com/fiducia-cloud/fiducia-telemetry.rs"
columns = ["options", "env", "type", "description"]

[parse]
allow_unknown = false

# Endpoints may contain userinfo/query credentials, and resource attributes are
# operator-provided metadata. Keep both out of argv/process listings.
[env]
ignore = ["OTEL_EXPORTER_OTLP_ENDPOINT", "OTEL_RESOURCE_ATTRIBUTES"]

[flags.log-format]
env = "FIDUCIA_LOG_FORMAT"
aliases = ["log-format"]
type = "string"
help = "Log output format: json (default) or text/plain/pretty/compact."

[flags.no-color]
env = "NO_COLOR"
aliases = ["no-color"]
type = "bool"
help = "Disable ANSI color in text logs."

[flags.otel-log-format]
env = "OTEL_LOG_FORMAT"
aliases = ["otel-log-format"]
type = "string"
help = "Fallback log format if FIDUCIA_LOG_FORMAT is unset."
